<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>
<style>

    @import url('https://fonts.googleapis.com/css2?family=Geist+Pixel&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap');
    
    * {
          font-family: "Montserrat", sans-serif !important;
    }
    
    .navbar {
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        top: 36px;
        width: 70%;
        height: 60px;
        background-color: transparent;
        border-radius: 25px;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        display: flex;
        justify-content: space-between; /* Pushes logo left, links right */
        align-items: center;
        padding: 0 30px; /* Spacing on the far left and right edges */
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); /* Subtle shadow under the nav */
        z-index: 1000; /* Keeps navbar on top of all other elements */
    }

    .logo {
        font-size: 24px;
        font-weight: bold;
        color: #333;
    }

    .nav-links {
        display: flex;
        align-items: center;
        margin: 0 0px;
        list-style: none;
        gap: 20px; /* Spacing between each link */
    }

    .nav-links a {
        font-family: "Montserrat", sans-serif;
        text-decoration: none;
        color: #555;
        font-weight: 500;
        transition: color 0.2s;
    }

    .nav-links a:hover {
        color: #000; /* Darkens on hover */
    }

</style>
<body>

    <nav class="navbar">
        <div class="logo">MyLogo</div>
        <ul class="nav-links">
            <li><a href="#about">About</a></li>
            <li><a href="#services">Services</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>
     
<div class="container-fluid text-center">
    <div class="row align-items-center">
        <div class="col min-vh-100 bg-secondary">
            hello world in col 1
        </div>
                <div class="col min-vh-100 bg-primary">
            hello world in col 2
        </div>
    </div>
</div>

<div class="container-fluid">
        <div class="row align-items-start">
        <div class="col min-vh-100 bg-warning">
            <h1>hello world in new section from start in h1</h1>
            <h2>hello world in new section from start in h2</h2>
            <h3>hello world in new section from start in h3</h3>
        </div>
    </div>
</div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
